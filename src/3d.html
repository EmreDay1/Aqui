<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Aqui 3D</title>

    <!-- CodeMirror Dependencies -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/mode/simple.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/edit/closebrackets.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.12/addon/comment/comment.min.js"></script>

    <!-- Three.js -->
    <script async src="https://unpkg.com/es-module-shims@1.8.0/dist/es-module-shims.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.159.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.159.0/examples/jsm/"
        }
    }
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100vh;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: monospace;
            background: #fff;
        }

        .header {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-bottom: 1px solid #ccc;
            background: #f8f8f8;
        }

        .logo {
            font-weight: bold;
            font-size: 18px;
        }

        .main-content {
            flex: 1;
            display: flex;
            min-height: 0;
        }

        .editor-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
        }

        .visualization-panel {
            width: 50%;
            position: relative;
        }

        #scene-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .CodeMirror {
            height: 100%;
            font-size: 14px;
            background: #fdf6e3;
        }

        .footer {
            height: 48px;
            display: flex;
            align-items: center;
            padding: 0 16px;
            border-top: 1px solid #ccc;
            background: #f8f8f8;
        }

        .button {
            padding: 8px 16px;
            margin-right: 10px;
            font-family: monospace;
            border: none;
            background: #e0e0e0;
            cursor: pointer;
        }

        .button:hover {
            background: #d0d0d0;
        }

        .panel {
            position: absolute;
            bottom: 48px;
            left: 0;
            right: 0;
            height: 200px;
            background: white;
            border-top: 1px solid #ccc;
            padding: 16px;
            display: none;
            font-family: monospace;
            font-size: 12px;
            overflow: auto;
        }

        .panel.visible {
            display: block;
        }

        .error-count {
            background: #d32f2f;
            color: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 11px;
            margin-left: 6px;
            display: none;
        }

        .error-count.visible {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">Aqui 3D</div>
    </div>

    <div class="main-content">
        <div class="editor-panel">
            <textarea id="code-editor"></textarea>
        </div>
        <div class="visualization-panel">
            <div id="scene-container"></div>
        </div>
    </div>

    <div class="footer">
        <button class="button" id="run-button">Run (Shift + Enter)</button>
        <button class="button" id="view-ast">View AST</button>
        <button class="button" id="export-svg">Export</button>
    </div>

    <script type="module" src="3D.js"></script>
</body>
</html>
