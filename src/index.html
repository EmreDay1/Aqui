<!DOCTYPE html>
<html>
<head>
    <title>AQUI Visual Test Environment</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            font-family: monospace;
            background: #f0f0f0;
        }
        #editor-panel {
            width: 40%;
            padding: 20px;
        }
        #visualization-panel {
            width: 60%;
            padding: 20px;
        }
        #code-editor {
            width: 100%;
            height: 400px;
            font-family: monospace;
            font-size: 14px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            background: #fff;
            resize: vertical;
        }
        #run-button {
            padding: 10px 20px;
            font-size: 14px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
            margin-bottom: 10px;
        }
        #error-display {
            color: red;
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        #canvas {
            border: 1px solid #ccc;
            background: white;
        }
        #output-display {
            margin-top: 10px;
            white-space: pre-wrap;
            font-family: monospace;
            height: 200px;
            overflow: auto;
            padding: 10px;
            background: white;
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <div id="editor-panel">
        <textarea id="code-editor">// AQUI</textarea>
        <button id="run-button">Run</button>
        <div id="error-display"></div>
        <div id="output-display"></div>
    </div>
    <div id="visualization-panel">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>

    <script type="module">
        import { Lexer, Parser } from './lexer_and_parser.mjs';
        import { Interpreter } from './interpreter.mjs';

        class Renderer {
            constructor(canvas) {
                this.canvas = canvas;
                this.ctx = canvas.getContext('2d');
                this.scale = 1;
                this.offsetX = canvas.width / 2;
                this.offsetY = canvas.height / 2;
            }

            clear() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.drawGrid();
                this.drawAxes();
            }

            drawGrid() {
                this.ctx.strokeStyle = '#e0e0e0';
                this.ctx.lineWidth = 1;

                for (let x = -400; x <= 400; x += 50) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.transformX(x), this.transformY(-300));
                    this.ctx.lineTo(this.transformX(x), this.transformY(300));
                    this.ctx.stroke();
                }

                for (let y = -300; y <= 300; y += 50) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(this.transformX(-400), this.transformY(y));
                    this.ctx.lineTo(this.transformX(400), this.transformY(y));
                    this.ctx.stroke();
                }
            }

            drawAxes() {
                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 2;

                this.ctx.beginPath();
                this.ctx.moveTo(this.transformX(-400), this.transformY(0));
                this.ctx.lineTo(this.transformX(400), this.transformY(0));
                this.ctx.stroke();

                this.ctx.beginPath();
                this.ctx.moveTo(this.transformX(0), this.transformY(-300));
                this.ctx.lineTo(this.transformX(0), this.transformY(300));
                this.ctx.stroke();
            }

            transformX(x) {
                return x * this.scale + this.offsetX;
            }

            transformY(y) {
                return -y * this.scale + this.offsetY;
            }

            drawShape(shape) {
                const { type, params, transform } = shape;
                this.ctx.save();
                
                this.ctx.translate(
                    this.transformX(transform.position[0]), 
                    this.transformY(transform.position[1])
                );
                this.ctx.rotate(-transform.rotation * Math.PI / 180);
                this.ctx.scale(transform.scale[0], transform.scale[1]);

                this.ctx.strokeStyle = '#000';
                this.ctx.lineWidth = 2;
                this.ctx.fillStyle = 'rgba(0,0,0,0.1)';

                switch (type) {
                    case 'rectangle':
                        this.drawRectangle(params);
                        break;
                    case 'circle':
                        this.drawCircle(params);
                        break;
                    case 'triangle':
                        this.drawTriangle(params);
                        break;
                    case 'ellipse':
                        this.drawEllipse(params);
                        break;
                    case 'path':
                        this.drawPath(params);
                        break;
                    case 'text':
                        this.drawText(params);
                        break;
                    case 'bezier':
                        this.drawBezierCurve(params);
                        break;
                    case 'cross':
                        this.drawCross(params);
                        break;
                    case 'gear':
                        this.drawGear(params);
                        break;
                    case 'slot':
                        this.drawSlot(params);
                        break;
                }

                this.ctx.restore();
            }

            // Original working shape functions
            drawRectangle(params) {
                const { width, height } = params;
                this.ctx.beginPath();
                this.ctx.rect(-width/2, -height/2, width, height);
                this.ctx.stroke();
                this.ctx.fill();
            }

            drawCircle(params) {
                const { radius } = params;
                this.ctx.beginPath();
                this.ctx.arc(0, 0, radius, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.fill();
            }

            drawEllipse(params) {
                const { radiusX, radiusY } = params;
                this.ctx.beginPath();
                this.ctx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
                this.ctx.stroke();
                this.ctx.fill();
            }

            // Fixed shape functions
            drawTriangle(params) {
                const { base, height } = params;
                this.ctx.beginPath();
                this.ctx.moveTo(-base/2, -height/2);
                this.ctx.lineTo(base/2, -height/2);
                this.ctx.lineTo(0, height/2);
                this.ctx.closePath();
                this.ctx.stroke();
                this.ctx.fill();
            }

            drawPath(params) {
                const points = params.points;
                if (!points || points.length < 2) return;

                this.ctx.beginPath();
                this.ctx.moveTo(points[0][0], points[0][1]);
                for (let i = 1; i < points.length; i++) {
                    this.ctx.lineTo(points[i][0], points[i][1]);
                }
                this.ctx.stroke();
                this.ctx.fill();
            }

            drawText(params) {
                const { text, fontSize = 24, fontFamily = 'Arial' } = params;
                
                // Set up text properties
                this.ctx.font = `${fontSize}px ${fontFamily}`;
                this.ctx.textAlign = 'center';
                this.ctx.textBaseline = 'middle';
                this.ctx.lineWidth = 2;
                
                // Draw outlined text (stroke only, no fill)
                this.ctx.strokeStyle = '#000';
                this.ctx.fillStyle = 'transparent';
                
                // First stroke the text
                this.ctx.strokeText(text, 0, 0);
                
                // Optional: make the inside slightly lighter
                this.ctx.lineWidth = 1;
                this.ctx.strokeStyle = '#ddd';
                this.ctx.strokeText(text, 0, 0);
            }
            drawBezierCurve(params) {
                const { start, control1, control2, end } = params;
                this.ctx.beginPath();
                this.ctx.moveTo(start[0], start[1]);
                this.ctx.bezierCurveTo(
                    control1[0], control1[1],
                    control2[0], control2[1],
                    end[0], end[1]
                );
                this.ctx.stroke();
            }

            drawCross(params) {
                const { width, thickness } = params;
                const w = width/2;
                const t = thickness/2;
                
                this.ctx.beginPath();
                this.ctx.moveTo(-t, -w);
                this.ctx.lineTo(t, -w);
                this.ctx.lineTo(t, -t);
                this.ctx.lineTo(w, -t);
                this.ctx.lineTo(w, t);
                this.ctx.lineTo(t, t);
                this.ctx.lineTo(t, w);
                this.ctx.lineTo(-t, w);
                this.ctx.lineTo(-t, t);
                this.ctx.lineTo(-w, t);
                this.ctx.lineTo(-w, -t);
                this.ctx.lineTo(-t, -t);
                this.ctx.closePath();
                this.ctx.stroke();
                this.ctx.fill();
            }

            drawGear(params) {
    const { diameter, teeth } = params;
    const radius = diameter / 2;
    const toothDepth = radius * 0.25;        // Deeper teeth for industrial look
    const toothWidth = (Math.PI * radius * 0.3) / teeth;  // Wider teeth
    const angleStep = (Math.PI * 2) / teeth;
    const innerRadius = radius * 0.4;        // Larger inner circle
    
    this.ctx.beginPath();
    
    // Draw main gear body with straight teeth
    for (let i = 0; i < teeth; i++) {
        const angle = i * angleStep;
        
        // Base circle points
        const x1 = Math.cos(angle - angleStep/4) * radius;
        const y1 = Math.sin(angle - angleStep/4) * radius;
        
        // Outer tooth points
        const x2 = Math.cos(angle - angleStep/6) * (radius + toothDepth);
        const y2 = Math.sin(angle - angleStep/6) * (radius + toothDepth);
        const x3 = Math.cos(angle + angleStep/6) * (radius + toothDepth);
        const y3 = Math.sin(angle + angleStep/6) * (radius + toothDepth);
        
        // Next base circle point
        const x4 = Math.cos(angle + angleStep/4) * radius;
        const y4 = Math.sin(angle + angleStep/4) * radius;

        if (i === 0) {
            this.ctx.moveTo(x1, y1);
        }
        
        // Draw straight-cut tooth
        this.ctx.lineTo(x1, y1);     // Base start
        this.ctx.lineTo(x2, y2);     // Tooth left edge
        this.ctx.lineTo(x3, y3);     // Tooth top
        this.ctx.lineTo(x4, y4);     // Tooth right edge
    }
    
    this.ctx.closePath();
    this.ctx.stroke();
    this.ctx.fill();
    
    // Draw inner circle (hub)
    this.ctx.beginPath();
    this.ctx.arc(0, 0, innerRadius, 0, Math.PI * 2);
    this.ctx.stroke();
    this.ctx.fill();
    
    // Draw center hole
    this.ctx.beginPath();
    this.ctx.arc(0, 0, innerRadius * 0.6, 0, Math.PI * 2);
    this.ctx.stroke();
}
            drawSlot(params) {
                const { length, width } = params;
                const radius = width / 2;
                const centerDist = (length - width) / 2;
                
                this.ctx.beginPath();
                
                // Left semicircle
                this.ctx.arc(-centerDist, 0, radius, Math.PI/2, -Math.PI/2, true);
                
                // Right semicircle
                this.ctx.arc(centerDist, 0, radius, -Math.PI/2, Math.PI/2, true);
                
                this.ctx.closePath();
                this.ctx.stroke();
                this.ctx.fill();
            }
        }
        // Setup test environment
        const canvas = document.getElementById('canvas');
        const renderer = new Renderer(canvas);
        const editor = document.getElementById('code-editor');
        const runButton = document.getElementById('run-button');
        const errorDisplay = document.getElementById('error-display');
        const outputDisplay = document.getElementById('output-display');

        runButton.addEventListener('click', () => {
            try {
                // Clear previous output
                errorDisplay.textContent = '';
                outputDisplay.textContent = '';
                renderer.clear();

                const code = editor.value;
                
                // Parse and interpret code
                const lexer = new Lexer(code);
                const parser = new Parser(lexer);
                const ast = parser.parse();
                
                outputDisplay.textContent = 'AST:\n' + JSON.stringify(ast, null, 2);

                const interpreter = new Interpreter();
                const result = interpreter.interpret(ast);

                // Draw shapes
                for (const shape of result.shapes.values()) {
                    renderer.drawShape(shape);
                }

                // Draw layers
                for (const layer of result.layers.values()) {
                    for (const shape of layer.shapes.values()) {
                        const transformedShape = {
                            ...shape,
                            transform: {
                                ...shape.transform,
                                rotation: (shape.transform.rotation || 0) + (layer.transform.rotation || 0),
                                scale: [
                                    (shape.transform.scale[0] || 1) * (layer.transform.scale[0] || 1),
                                    (shape.transform.scale[1] || 1) * (layer.transform.scale[1] || 1)
                                ]
                            }
                        };
                        renderer.drawShape(transformedShape);
                    }
                }

            } catch (error) {
                errorDisplay.textContent = `Error: ${error.message}\n${error.stack}`;
                console.error(error);
            }
        });

        // Initial render
        runButton.click();
    </script>
</body>
</html>
