<!DOCTYPE html>
<html>
<head>
    <title>AQUI Visual Test Environment</title>
    <style>
       :root {
    /* Vintage technical paper colors */
    --bg-paper: #fffdf5;
    --bg-darker: #f5f3e8;
    --text-primary: #1e1e1e;
    --text-secondary: #454545;
    --accent-dark: #2d2d2d;
    --accent-mid: #696969;
    --border-color: #b5b3a7;
    --grid-color: #d6d4c9;
    --blueprint-blue: #264b78;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: "Courier New", monospace;
    height: 100vh;
    background: var(--bg-paper);
    color: var(--text-primary);
    overflow: hidden;
    display: flex;
}

.panel {
    height: 100vh;
    display: flex;
    flex-direction: column;
}

#editor-panel {
    width: 700px;
    background: var(--bg-darker);
    border-right: 2px solid var(--border-color);
    padding: 1rem;
    position: relative;
    z-index: 2;
    box-shadow: 3px 0 10px rgba(0, 0, 0, 0.1);
}

#visualization-panel {
    flex: 1;
    background: var(--bg-paper);
    padding: 0;
    position: relative;
    overflow: hidden;
}

#code-editor {
    width: 100%;
    height: calc(100% - 140px);
    font-family: "Courier New", monospace;
    font-size: 14px;
    line-height: 1.5;
    padding: 1rem;
    background: var(--bg-paper);
    color: var(--text-primary);
    border: 1px solid var(--border-color);
    resize: none;
    outline: none;
    white-space: pre;
    overflow: auto;
}

#run-button {
    width: 100%;
    padding: 0.75rem;
    margin: 1rem 0;
    font-family: "Courier New", monospace;
    font-size: 14px;
    background: var(--accent-dark);
    color: var(--bg-paper);
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    text-transform: uppercase;
}

#run-button:hover {
    background: var(--blueprint-blue);
}

#error-display {
    color: #8b0000;
    font-family: "Courier New", monospace;
    font-size: 12px;
    padding: 0.5rem;
    margin-top: 0.5rem;
    background: var(--bg-paper);
    border: 1px solid #8b0000;
    max-height: 100px;
    overflow: auto;
}

#output-display {
    font-family: "Courier New", monospace;
    font-size: 12px;
    padding: 0.5rem;
    margin-top: 0.5rem;
    background: var(--bg-paper);
    border: 1px solid var(--border-color);
    height: 100px;
    overflow: auto;
}

#canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: var(--bg-paper);
}

/* Technical paper texture */
.panel::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image: 
        linear-gradient(rgba(185, 183, 173, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(185, 183, 173, 0.05) 1px, transparent 1px);
    background-size: 20px 20px;
    pointer-events: none;
}

.panel-header {
    font-family: "Courier New", monospace;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border-color);
    padding-bottom: 0.5rem;
    margin-bottom: 1rem;
}

/* Vintage scrollbar */
::-webkit-scrollbar {
    width: 8px;
    height: 8px;
}

::-webkit-scrollbar-track {
    background: var(--bg-darker);
    border: 1px solid var(--border-color);
}

::-webkit-scrollbar-thumb {
    background: var(--accent-mid);
    border: 1px solid var(--border-color);
}

::-webkit-scrollbar-thumb:hover {
    background: var(--text-secondary);
}
    </style>
</head>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/prism.min.js"></script>
  <script>
    Prism.languages.aqui = {
    'comment': /\/\/.*|#.*/,
    'string': /"(?:\\.|[^\\"])*"/,
    'keyword': /\b(?:rectangle|circle|triangle|ellipse|text|path|gear|star|cross|slot|arc|spiral|wave|donut|layer|transform|add|subtract|if|else|for|in|range|to|step)\b/,
    'property': /\b(?:position|rotation|scale|scaleX|scaleY|width|height|radius|base|content|fontSize|fontFamily|points|startAngle|endAngle|thickness|diameter|teeth|outerRadius|innerRadius|radiusX|radiusY|startRadius|endRadius|turns|amplitude|frequency|length|pitch_diameter|pressure_angle|shaft_type|shaft_size)\b/,
    'shape_type': /\b(?:round|chamfer|all|top|bottom|left|right)\b/,
    'number': /\b-?(?:\d+(?:\.\d*)?|\.\d+)(?:e[+-]?\d+)?\b/,
    'boolean': /\b(?:true|false)\b/,
    'operator': /&&|\|\||==|!=|<=|>=|<|>|\*|\+|\-|\/|%/,
    'punctuation': /[{}[\];(),.:]/,
    'function': /\b(?:range)\b/
};

// Ensure Prism highlights the language
Prism.languages.insertBefore('aqui', 'comment', {
    'class-name': {
        pattern: /\b(?:circle|rectangle|triangle|layer)\b/,
        alias: 'keyword'
    }
});
  </script>
</head>
<body>
    <div id="editor-panel">
        <textarea id="code-editor">// AQUI</textarea>
        <button id="run-button">Run</button>
        <div id="error-display"></div>
        <div id="output-display"></div>
    </div>
    <div id="visualization-panel">
        <canvas id="canvas" width="800" height="600"></canvas>
    </div>

    <script type="module">
        import { LogicalLexer, LogicalParser } from './logical_lexer_and_parser.mjs';
        import { Interpreter } from './interpreter.mjs';

        class Renderer {
    constructor(canvas) {
        this.canvas = canvas;
        this.ctx = canvas.getContext('2d');
        this.scale = 1;
        this.offsetX = canvas.width / 2;
        this.offsetY = canvas.height / 2;
    }

    clear() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        this.drawGrid();
        this.drawAxes();
    }

    drawGrid() {
        this.ctx.strokeStyle = '#e0e0e0';
        this.ctx.lineWidth = 1;

        // Vertical lines
        for (let x = -400; x <= 400; x += 50) {
            const [screenX] = this.worldToScreen(x, 0);
            this.ctx.beginPath();
            this.ctx.moveTo(screenX, 0);
            this.ctx.lineTo(screenX, this.canvas.height);
            this.ctx.stroke();
        }

        // Horizontal lines
        for (let y = -300; y <= 300; y += 50) {
            const [, screenY] = this.worldToScreen(0, y);
            this.ctx.beginPath();
            this.ctx.moveTo(0, screenY);
            this.ctx.lineTo(this.canvas.width, screenY);
            this.ctx.stroke();
        }
    }

    drawAxes() {
        this.ctx.strokeStyle = '#000';
        this.ctx.lineWidth = 2;

        // X axis
        const [, yAxisY] = this.worldToScreen(0, 0);
        this.ctx.beginPath();
        this.ctx.moveTo(0, yAxisY);
        this.ctx.lineTo(this.canvas.width, yAxisY);
        this.ctx.stroke();

        // Y axis
        const [xAxisX] = this.worldToScreen(0, 0);
        this.ctx.beginPath();
        this.ctx.moveTo(xAxisX, 0);
        this.ctx.lineTo(xAxisX, this.canvas.height);
        this.ctx.stroke();
    }

    worldToScreen(worldX, worldY) {
        return [
            worldX * this.scale + this.offsetX,
            this.offsetY - worldY * this.scale
        ];
    }
    

    drawShape(shape) {
        const { type, params, transform } = shape;
        
        this.ctx.save();
        
        // Convert world coordinates to screen coordinates
        const [screenX, screenY] = this.worldToScreen(
            transform.position[0],
            transform.position[1]
        );

        // Apply transformations
        this.ctx.translate(screenX, screenY);
        this.ctx.rotate(-transform.rotation * Math.PI / 180);
        this.ctx.scale(transform.scale[0], transform.scale[1]);

        // Set default styling
        this.ctx.strokeStyle = '#000';
        this.ctx.lineWidth = 2;
        this.ctx.fillStyle = 'rgba(0,0,0,0.1)';

        // Draw appropriate shape
        switch (type) {
            case 'rectangle':
                this.drawRectangle(params);
                break;
            case 'circle':
                this.drawCircle(params);
                break;
            case 'triangle':
                this.drawTriangle(params);
                break;
            case 'ellipse':
                this.drawEllipse(params);
                break;
            case 'path':
                this.drawPath(params);
                break;
            case 'text':
                this.drawText(params);
                break;
            case 'bezier':
                this.drawBezierCurve(params);
                break;
            case 'cross':
                this.drawCross(params);
                break;
            case 'gear':
                this.drawGear(params);
                break;
            case 'slot':
                this.drawSlot(params);
                break;
        }

        this.ctx.restore();
    }

    drawRectangle(params) {
        const { width, height } = params;
        this.ctx.beginPath();
        this.ctx.rect(-width/2, -height/2, width, height);
        this.ctx.stroke();
        this.ctx.fill();
    }

    drawCircle(params) {
        const { radius } = params;
        this.ctx.beginPath();
        this.ctx.arc(0, 0, radius, 0, Math.PI * 2);
        this.ctx.stroke();
        this.ctx.fill();
    }

    drawEllipse(params) {
        const { radiusX, radiusY } = params;
        this.ctx.beginPath();
        this.ctx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
        this.ctx.stroke();
        this.ctx.fill();
    }

    drawTriangle(params) {
        const { base, height } = params;
        this.ctx.beginPath();
        this.ctx.moveTo(-base/2, -height/2);
        this.ctx.lineTo(base/2, -height/2);
        this.ctx.lineTo(0, height/2);
        this.ctx.closePath();
        this.ctx.stroke();
        this.ctx.fill();
    }

    drawPath(params) {
        const { points } = params;
        if (!points || points.length < 2) return;

        this.ctx.beginPath();
        this.ctx.moveTo(points[0][0], points[0][1]);
        for (let i = 1; i < points.length; i++) {
            this.ctx.lineTo(points[i][0], points[i][1]);
        }
        if (points.length > 2) {
            this.ctx.closePath();
        }
        this.ctx.stroke();
        this.ctx.fill();
    }

    drawText(params) {
        const { text, fontSize = 24, fontFamily = 'Arial' } = params;
        // Flip text right-side up since we're in a transformed context
        this.ctx.scale(1, -1);
        this.ctx.font = `${fontSize}px ${fontFamily}`;
        this.ctx.textAlign = 'center';
        this.ctx.textBaseline = 'middle';
        
        // Draw outlined text
        this.ctx.strokeStyle = '#000';
        this.ctx.lineWidth = 2;
        this.ctx.strokeText(text, 0, 0);
        
        // Inner detail
        this.ctx.strokeStyle = '#ddd';
        this.ctx.lineWidth = 1;
        this.ctx.strokeText(text, 0, 0);
    }

    drawBezierCurve(params) {
        const { start, control1, control2, end } = params;
        this.ctx.beginPath();
        this.ctx.moveTo(start[0], start[1]);
        this.ctx.bezierCurveTo(
            control1[0], control1[1],
            control2[0], control2[1],
            end[0], end[1]
        );
        this.ctx.stroke();
    }

    drawCross(params) {
        const { width, thickness } = params;
        const w = width/2;
        const t = thickness/2;
        
        this.ctx.beginPath();
        this.ctx.moveTo(-t, -w);
        this.ctx.lineTo(t, -w);
        this.ctx.lineTo(t, -t);
        this.ctx.lineTo(w, -t);
        this.ctx.lineTo(w, t);
        this.ctx.lineTo(t, t);
        this.ctx.lineTo(t, w);
        this.ctx.lineTo(-t, w);
        this.ctx.lineTo(-t, t);
        this.ctx.lineTo(-w, t);
        this.ctx.lineTo(-w, -t);
        this.ctx.lineTo(-t, -t);
        this.ctx.closePath();
        this.ctx.stroke();
        this.ctx.fill();
    }

// In Renderer class
// In Renderer class
drawGear(params) {
    const { pitch_diameter, teeth, shaft_config } = params;
    const radius = pitch_diameter / 2;
    const toothDepth = radius * 0.25;        // Deeper teeth for industrial look
    const toothWidth = (Math.PI * radius * 0.3) / teeth;  // Wider teeth
    const angleStep = (Math.PI * 2) / teeth;
    const innerRadius = radius * 0.4;        // Larger inner circle
    
    this.ctx.beginPath();
    
    // Draw main gear body with straight teeth
    for (let i = 0; i < teeth; i++) {
        const angle = i * angleStep;
        
        // Base circle points
        const x1 = Math.cos(angle - angleStep/4) * radius;
        const y1 = Math.sin(angle - angleStep/4) * radius;
        
        // Outer tooth points
        const x2 = Math.cos(angle - angleStep/6) * (radius + toothDepth);
        const y2 = Math.sin(angle - angleStep/6) * (radius + toothDepth);
        const x3 = Math.cos(angle + angleStep/6) * (radius + toothDepth);
        const y3 = Math.sin(angle + angleStep/6) * (radius + toothDepth);
        
        // Next base circle point
        const x4 = Math.cos(angle + angleStep/4) * radius;
        const y4 = Math.sin(angle + angleStep/4) * radius;

        if (i === 0) {
            this.ctx.moveTo(x1, y1);
        }
        
        // Draw straight-cut tooth
        this.ctx.lineTo(x1, y1);     // Base start
        this.ctx.lineTo(x2, y2);     // Tooth left edge
        this.ctx.lineTo(x3, y3);     // Tooth top
        this.ctx.lineTo(x4, y4);     // Tooth right edge
    }
    
    this.ctx.closePath();
    this.ctx.stroke();
    this.ctx.fill();
    
    // Draw shaft
    this.ctx.beginPath();
    const shaftSize = shaft_config?.size || innerRadius * 0.6;
    
    if (shaft_config?.type === 'square') {
        const halfSize = shaftSize / 2;
        this.ctx.moveTo(-halfSize, -halfSize);
        this.ctx.lineTo(halfSize, -halfSize);
        this.ctx.lineTo(halfSize, halfSize);
        this.ctx.lineTo(-halfSize, halfSize);
        this.ctx.closePath();
    } else {
        // Default to circle
        this.ctx.arc(0, 0, shaftSize / 2, 0, Math.PI * 2);
    }
    
    this.ctx.stroke();
    this.ctx.fillStyle = 'rgba(150, 150, 150, 0.3)';
    this.ctx.fill();
}

    

    drawSlot(params) {
        const { length, width } = params;
        const radius = width / 2;
        const centerDist = (length - width) / 2;
        
        this.ctx.beginPath();
        // Left semicircle
        this.ctx.arc(-centerDist, 0, radius, Math.PI/2, -Math.PI/2, true);
        // Right semicircle
        this.ctx.arc(centerDist, 0, radius, -Math.PI/2, Math.PI/2, true);
        this.ctx.closePath();
        this.ctx.stroke();
        this.ctx.fill();
    }
}
        // Setup test environment
        const canvas = document.getElementById('canvas');
const renderer = new Renderer(canvas);
const editor = document.getElementById('code-editor');
const runButton = document.getElementById('run-button');
const errorDisplay = document.getElementById('error-display');
const outputDisplay = document.getElementById('output-display');

runButton.addEventListener('click', () => {
    try {
        // Clear previous output
        errorDisplay.textContent = '';
        outputDisplay.textContent = '';
        renderer.clear();

        const code = editor.value;

        // Parse and interpret code
        const lexer = new LogicalLexer(code);
        const parser = new LogicalParser(lexer);
        const ast = parser.parse();

        outputDisplay.textContent = 'AST:\n' + JSON.stringify(ast, null, 2);

        const interpreter = new Interpreter();
        const result = interpreter.interpret(ast);

        // Draw shapes
        for (const shape of result.shapes.values()) {
            renderer.drawShape(shape);
        }

        // Draw layers
        for (const layer of result.layers.values()) {
            for (const shape of layer.shapes.values()) {
                const transformedShape = {
                    ...shape,
                    transform: {
                        ...shape.transform,
                        rotation: (shape.transform.rotation || 0) + (layer.transform.rotation || 0),
                        scale: [
                            (shape.transform.scale[0] || 1) * (layer.transform.scale[0] || 1),
                            (shape.transform.scale[1] || 1) * (layer.transform.scale[1] || 1)
                        ]
                    }
                };
                renderer.drawShape(transformedShape);
            }
        }
    } catch (error) {
        errorDisplay.textContent = `Error: ${error.message}\n${error.stack}`;
        console.error(error);
    }
});

// Initial render
runButton.click();
    </script>

<script>
    Prism.highlightAll();
  </script>
</body>
</html>
