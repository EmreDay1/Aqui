<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>AQUI Visual Test Environment</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: #fff;
    }
    
    .header {
      display: flex;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      background: #f8f8f8;
    }

    .logo {
      font-weight: bold;
      font-size: 18px;
      margin-right: 20px;
    }

    .main-content {
      display: flex;
      flex: 1;
      height: calc(100vh - 90px);
    }

    .editor-panel {
      width: 50%;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
    }

    .code-editor {
      flex: 1;
      padding: 10px;
      font-family: monospace;
      font-size: 14px;
      border: none;
      resize: none;
      background: #fdf6e3;
    }

    .visualization-panel {
      width: 50%;
      padding: 20px;
      background: #fff;
    }

    .canvas-container {
      border: 1px dashed #000;
      height: 100%;
    }

    .footer {
      display: flex;
      padding: 10px;
      border-top: 1px solid #ccc;
      background: #f8f8f8;
    }

    .button {
      padding: 8px 16px;
      margin-right: 10px;
      font-family: monospace;
      border: none;
      background: #e0e0e0;
      cursor: pointer;
    }

    .button:hover {
      background: #d0d0d0;
    }

    .ast-panel {
      position: fixed;
      bottom: 40px;
      left: 0;
      right: 0;
      height: 200px;
      background: white;
      border-top: 1px solid #ccc;
      padding: 10px;
      display: none;
      overflow: auto;
    }

    .ast-panel.visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Domine, non nisi Te</div>
  </div>

  <div class="main-content">
    <div class="editor-panel">
      <textarea class="code-editor" id="code-editor">// AQUI</textarea>
    </div>
    <div class="visualization-panel">
      <div class="canvas-container">
        <canvas id="canvas" width="800" height="600"></canvas>
      </div>
    </div>
  </div>

  <div class="ast-panel" id="ast-panel">
    <pre id="ast-output"></pre>
  </div>

  <div class="footer">
    <button class="button" id="run-button">run (Shift + Enter)</button>
    <button class="button" id="view-ast">view</button>
  </div>

  <script type="module">
    (async () => {
      try {
        const { Lexer } = await import('./lexer.mjs');
        const { Parser } = await import('./parser.mjs');
        const { Interpreter } = await import('./interpreter.mjs');
        const { Renderer } = await import('./renderer.mjs');

        const canvas = document.getElementById('canvas');
        const renderer = new Renderer(canvas);
        const editor = document.getElementById('code-editor');
        const runButton = document.getElementById('run-button');
        const viewAstButton = document.getElementById('view-ast');
        const astPanel = document.getElementById('ast-panel');
        const astOutput = document.getElementById('ast-output');

        function runCode() {
          try {
            renderer.clear();
            const code = editor.value;
            const lexer = new Lexer(code);
            const parser = new Parser(lexer);
            const ast = parser.parse();
            astOutput.textContent = JSON.stringify(ast, null, 2);

            const interpreter = new Interpreter();
            const result = interpreter.interpret(ast);

            for (const shape of result.shapes.values()) {
              renderer.drawShape(shape);
            }

            for (const layer of result.layers.values()) {
              const { transform } = layer;
              for (const shape of layer.shapes.values()) {
                const combinedShape = {
                  ...shape,
                  transform: {
                    position: shape.transform.position,
                    rotation: (shape.transform.rotation || 0) + (transform.rotation || 0),
                    scale: [
                      shape.transform.scale[0] * transform.scale[0],
                      shape.transform.scale[1] * transform.scale[1]
                    ]
                  }
                };
                renderer.drawShape(combinedShape);
              }
            }
          } catch (error) {
            console.error(error);
          }
        }

        runButton.addEventListener('click', runCode);
        viewAstButton.addEventListener('click', () => {
          astPanel.classList.toggle('visible');
        });

        editor.addEventListener('keydown', (e) => {
          if (e.shiftKey && e.key === 'Enter') {
            e.preventDefault();
            runCode();
          }
        });

        // Initial run
        runCode();
      } catch (error) {
        console.error('Module import error:', error);
      }
    })();
  </script>
</body>
</html>
